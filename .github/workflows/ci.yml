name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newnextmarket_ci
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      CORS_ORIGIN: https://www.newnextmarket.asia,https://admin.newnextmarket.asia
      NEXT_PUBLIC_API_URL: https://api.newnextmarket.asia/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate -w apps/backend-api
      - run: npx prisma validate --schema apps/backend-api/prisma/schema.prisma
      - run: npm run backend:test
      - run: npm run backend:build
      - run: npm run admin:build
      - run: npm run build -w apps/customer-frontend

  e2e:
    if: ${{ secrets.CI_DATABASE_URL != '' && secrets.CI_REDIS_URL != '' && secrets.CI_JWT_SECRET != '' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      REDIS_URL: ${{ secrets.CI_REDIS_URL }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      CORS_ORIGIN: https://www.newnextmarket.asia,https://admin.newnextmarket.asia
      RUN_E2E: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate -w apps/backend-api
      - run: npm run test:e2e -w apps/backend-api
