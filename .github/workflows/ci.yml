name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newnextmarket_ci
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      CORS_ORIGIN: https://www.newnextmarket.asia,https://admin.newnextmarket.asia
      NEXT_PUBLIC_API_URL: https://api.newnextmarket.asia/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate -w apps/backend-api
      - run: npx prisma validate --schema apps/backend-api/prisma/schema.prisma
      - run: npm run backend:test
      - run: npm run backend:build
      - run: npm run admin:build
      - run: npm run build -w apps/customer-frontend

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: newnextmarket_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d newnextmarket_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newnextmarket_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      CORS_ORIGIN: http://localhost:3001,http://localhost:3002
      RUN_E2E: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate -w apps/backend-api
      - run: npm run prisma:migrate:deploy -w apps/backend-api
      - run: npm run prisma:seed -w apps/backend-api
      - run: npm run test:e2e -w apps/backend-api
