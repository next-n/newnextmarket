services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/backend-api/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  redis-data:
