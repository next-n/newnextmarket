server {
    listen 80;
    listen [::]:80;
    server_name api.newnextmarket.asia;

    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name newnextmarket.asia;

    return 308 https://www.newnextmarket.asia$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.newnextmarket.asia;

    client_max_body_size 6m;
    ssl_certificate /etc/letsencrypt/live/api.newnextmarket.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.newnextmarket.asia/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
